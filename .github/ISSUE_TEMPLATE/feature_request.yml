name: Feature request
description: Suggest a new feature or improvement
title: "feat: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve ai-safe-context. Please focus on practical, local-first workflows that reduce accidental leakage when sharing repository context with AI assistants.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain or workflow gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, CLI flags, output format, or API shape.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other tools or approaches did you consider?
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This can run locally without uploading repository contents to a cloud service.
        - label: This does not require real secrets or private code in tests or examples.
        - label: This fits the repo-to-AI-context use case.
