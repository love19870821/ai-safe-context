name: Bug report
description: Report a reproducible problem in ai-safe-context
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please avoid posting real secrets, tokens, private repository contents, or customer data.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Use a minimal synthetic example whenever possible.
      placeholder: |
        1. Create file ...
        2. Run ai-safe-context ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Minimal sample input
      description: Synthetic samples only. Do not paste real credentials or private code.
      render: text
  - type: input
    id: version
    attributes:
      label: ai-safe-context version
      placeholder: "0.1.0"
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "Python 3.11"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
